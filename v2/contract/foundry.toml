[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
hedera_testnet = "https://testnet.hashio.io/api"
hedera_mainnet = "https://mainnet.hashio.io/api"

[etherscan]
hedera_testnet = { key = "testnet", url = "https://testnet.hashio.io/api" }
hedera_mainnet = { key = "mainnet", url = "https://mainnet.hashio.io/api" }
